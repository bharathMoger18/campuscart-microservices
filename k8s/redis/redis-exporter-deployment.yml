apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: campuscart
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:latest

          env:
            - name: REDIS_ADDR
              value: "redis://redis.campuscart.svc.cluster.local:6379"
              # "redis" is your actual Service name in the campuscart namespace
              # (confirmed via `kubectl get svc -n campuscart` — service/redis, port 6379)

            - name: REDIS_EXPORTER_LOG_FORMAT
              value: "json"

            - name: REDIS_EXPORTER_CHECK_KEYS
              value: "asgi:*"
              # Django Channels stores channel layer state under asgi:* keys.
              # This makes redis_exporter run LLEN on each match and expose
              # redis_key_size{key="asgi:..."} — your queue-depth-per-channel signal.

          ports:
            - name: metrics
              containerPort: 9121

          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"

          readinessProbe:
            httpGet:
              path: /metrics
              port: 9121
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /metrics
              port: 9121
            initialDelaySeconds: 10
            periodSeconds: 30