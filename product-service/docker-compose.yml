
services:

  # ── PostgreSQL database for product-service ───────────────────────
  product-db:
    image: postgres:14
    container_name: product-db
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: product_password
    volumes:
      # Persist data even if container is removed
      - product_db_data:/var/lib/postgresql/data
    ports:
      # 5434 on host → 5432 inside container
      # 5432 = system postgres, 5433 = auth-service db, 5434 = ours
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_user -d product_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Product service (Django + Gunicorn) ───────────────────────────
  product-service:
    image: product-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product-service
    env_file:
      - .env
    environment:
      # Override .env values for Docker networking
      DB_HOST: product-db
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://auth-service:8000
    ports:
      # 8002 on host → 8000 inside container
      # 8000 = monolith, 8001 = auth-service, 8002 = product-service
      - "8002:8000"
    volumes:
      # Persist uploaded product images
      - product_media:/app/media
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - default
      # Connect to auth-service network so we can call auth-service
      - auth-service_default

# ── Volumes ───────────────────────────────────────────────────────────
volumes:
  product_db_data:
  product_media:

# ── Networks ──────────────────────────────────────────────────────────
networks:
  default:
    name: product-service_default
  auth-service_default:
    external: true
