name: Auth Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'auth-service/**'
      - '.github/workflows/auth-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'auth-service/**'
  workflow_dispatch:

env:
  SERVICE_NAME: auth-service
  HELM_RELEASE: auth
  HELM_CHART: /home/bharath/helm/auth-service
  K8S_NAMESPACE: campuscart

jobs:
  # ─────────────────────────────────────────
  # JOB 1: BUILD AND TEST
  # ─────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: auth-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        working-directory: auth-service
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_HOST: localhost
          DB_PORT: "5432"
          EMAIL_HOST_USER: test@test.com
          EMAIL_HOST_PASSWORD: testpass
          FRONTEND_URL: http://localhost
        run: |
          python manage.py check
          echo "✅ Django checks passed"

  # ─────────────────────────────────────────
  # JOB 2: BUILD AND PUSH DOCKER IMAGE
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      short-sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: |
            ghcr.io/bharathmoger18/auth-service:${{ steps.sha.outputs.short }}
            ghcr.io/bharathmoger18/auth-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image details
        run: |
          echo "✅ Image pushed successfully"
          echo "Image: ghcr.io/bharathmoger18/auth-service:${{ steps.sha.outputs.short }}"

  # ─────────────────────────────────────────
  # JOB 3: DEPLOY TO KUBERNETES
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KUBE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.KUBE_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy via Helm on K8s master
        run: |
          ssh ${{ secrets.KUBE_SSH_USER }}@${{ secrets.KUBE_SSH_HOST }} << ENDSSH
            set -e
            echo "🚀 Deploying auth-service..."

            helm upgrade auth /home/bharath/helm/auth-service \
              --namespace campuscart \
              --set image.repository=ghcr.io/bharathmoger18/auth-service \
              --set image.tag=${{ steps.sha.outputs.short }} \
              --set image.pullPolicy=Always \
              --wait \
              --timeout 5m

            echo "✅ Helm upgrade complete"

            kubectl rollout status deployment/auth-auth-service \
              --namespace campuscart \
              --timeout=5m

            echo "🎉 Deployment successful!"
            kubectl get pods -n campuscart | grep auth
          ENDSSH

      - name: Verify service health
        run: |
          sleep 15
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"email":"test@test.com","password":"wrong"}' \
            http://${{ secrets.KUBE_SSH_HOST }}:30080/api/v1/auth/token/)
          echo "Health check response: $HTTP_CODE"
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "400" ]; then
            echo "✅ Auth service is healthy!"
          else
            echo "❌ Unexpected response: $HTTP_CODE"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "✅ Auth service deployed!"
          echo "Image: ghcr.io/bharathmoger18/auth-service:${{ steps.sha.outputs.short }}"
          echo "Time: $(date)"
