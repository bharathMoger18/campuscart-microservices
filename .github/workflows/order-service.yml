name: Order Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'order-service/**'
      - '.github/workflows/order-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'order-service/**'
  workflow_dispatch:

env:
  SERVICE_NAME: order-service
  HELM_RELEASE: order
  HELM_CHART: /home/bharath/helm/order-service
  K8S_NAMESPACE: campuscart

jobs:
  build-and-test:
    name: Build & Test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: order-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        working-directory: order-service
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_HOST: localhost
          DB_PORT: "5432"
          AUTH_SERVICE_URL: http://localhost:8001
          PRODUCT_SERVICE_URL: http://localhost:8002
          STRIPE_SECRET_KEY: sk_test_dummy_for_ci
          STRIPE_PUBLISHABLE_KEY: pk_test_dummy_for_ci
          STRIPE_WEBHOOK_SECRET: whsec_dummy_for_ci
        run: |
          python manage.py check
          echo "✅ Django checks passed"

  build-and-push:
    name: Build & Push Image
    runs-on: self-hosted
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: |
            ghcr.io/bharathmoger18/order-service:${{ steps.sha.outputs.short }}
            ghcr.io/bharathmoger18/order-service:latest

      - name: Print image details
        run: |
          echo "✅ Image pushed successfully"
          echo "Image: ghcr.io/bharathmoger18/order-service:${{ steps.sha.outputs.short }}"

  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          cp ~/.ssh/github_actions_key ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.KUBE_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy via Helm on K8s master
        run: |
          ssh -i ~/.ssh/github_actions_key -o StrictHostKeyChecking=no -T ${{ secrets.KUBE_SSH_USER }}@${{ secrets.KUBE_SSH_HOST }} << ENDSSH
            set -e
            echo "🚀 Deploying order-service..."

            helm upgrade order /home/bharath/helm/order-service \
              --namespace campuscart
              --set image.repository=ghcr.io/bharathmoger18/order-service \
              --set image.tag=${{ steps.sha.outputs.short }} \
              --set image.pullPolicy=Always \

            echo "✅ Helm upgrade complete"

            kubectl rollout status deployment/order-order-service \
              --namespace campuscart

            echo "🎉 Deployment successful!"
            kubectl get pods -n campuscart | grep order
          ENDSSH

      - name: Verify service health
        run: |
          sleep 15
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            http://${{ secrets.KUBE_WORKER_HOST }}:30080/api/v1/orders/)
          echo "Health check response: $HTTP_CODE"
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "✅ Order service is healthy!"
          else
            echo "❌ Unexpected response: $HTTP_CODE"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "✅ Order service deployed!"
          echo "Image: ghcr.io/bharathmoger18/order-service:${{ steps.sha.outputs.short }}"
          echo "Time: $(date)"
