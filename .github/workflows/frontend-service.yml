name: Frontend Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend-service/**'
      - '.github/workflows/frontend-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend-service/**'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-service
          push: true
          tags: |
            ghcr.io/bharathmoger18/frontend-service:${{ steps.sha.outputs.short }}
            ghcr.io/bharathmoger18/frontend-service:latest

      - name: Print image details
        run: echo "Image pushed ghcr.io/bharathmoger18/frontend-service:${{ steps.sha.outputs.short }}"

  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy via Helm on K8s master
        env:
          IMAGE_TAG: ${{ steps.sha.outputs.short }}
          SSH_HOST: ${{ secrets.KUBE_SSH_HOST }}
          SSH_USER: ${{ secrets.KUBE_SSH_USER }}
        run: |
          ssh -i ~/.ssh/github_actions_key -o StrictHostKeyChecking=no -T ${SSH_USER}@${SSH_HOST} "helm upgrade frontend /home/bharath/helm/frontend-service --namespace campuscart --set image.repository=ghcr.io/bharathmoger18/frontend-service --set image.tag=${IMAGE_TAG} --set image.pullPolicy=Always && echo DEPLOY_OK"

      - name: Verify service health
        env:
          SSH_HOST: ${{ secrets.KUBE_SSH_HOST }}
          SSH_USER: ${{ secrets.KUBE_SSH_USER }}
        run: |
          sleep 15
          ssh -i ~/.ssh/github_actions_key -o StrictHostKeyChecking=no -T ${SSH_USER}@${SSH_HOST} "kubectl get pods -n campuscart | grep frontend"

      - name: Deployment summary
        run: |
          echo "Service deployed: frontend-service"
          echo "Image: ghcr.io/bharathmoger18/frontend-service:${{ steps.sha.outputs.short }}"
          echo "Time: $(date)"
