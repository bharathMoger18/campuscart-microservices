name: Notification Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'notification-service/**'
      - '.github/workflows/notification-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'notification-service/**'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: notification-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        working-directory: notification-service
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_HOST: localhost
          DB_PORT: "5432"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          AUTH_SERVICE_URL: http://localhost:8001
          VAPID_PUBLIC_KEY: test_vapid_public_key
          VAPID_PRIVATE_KEY: test_vapid_private_key
          VAPID_EMAIL: mailto:test@test.com
        run: |
          python manage.py check
          echo "Django checks passed"

  build-and-push:
    name: Build & Push Image
    runs-on: self-hosted
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: |
            ghcr.io/bharathmoger18/notification-service:${{ steps.sha.outputs.short }}
            ghcr.io/bharathmoger18/notification-service:latest

      - name: Print image details
        run: echo "Image pushed ghcr.io/bharathmoger18/notification-service:${{ steps.sha.outputs.short }}"

  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy via Helm on K8s master
        env:
          IMAGE_TAG: ${{ steps.sha.outputs.short }}
          SSH_HOST: ${{ secrets.KUBE_SSH_HOST }}
          SSH_USER: ${{ secrets.KUBE_SSH_USER }}
        run: |
          ssh -i ~/.ssh/github_actions_key -o StrictHostKeyChecking=no -T ${SSH_USER}@${SSH_HOST} "helm upgrade notification /home/bharath/helm/notification-service --namespace campuscart --set image.repository=ghcr.io/bharathmoger18/notification-service --set image.tag=${IMAGE_TAG} --set image.pullPolicy=Always && kubectl rollout status deployment/notification-notification-service --namespace campuscart --timeout=10m && echo DEPLOY_OK"

      - name: Verify service health
        env:
          SSH_HOST: ${{ secrets.KUBE_SSH_HOST }}
          SSH_USER: ${{ secrets.KUBE_SSH_USER }}
        run: |
          sleep 15
          ssh -i ~/.ssh/github_actions_key -o StrictHostKeyChecking=no -T ${SSH_USER}@${SSH_HOST} "kubectl get pods -n campuscart | grep notification"

      - name: Deployment summary
        run: |
          echo "Service deployed: notification-service"
          echo "Image: ghcr.io/bharathmoger18/notification-service:${{ steps.sha.outputs.short }}"
          echo "Time: $(date)"
