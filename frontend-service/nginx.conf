server {
    listen 80;
    server_name _;

    # Root directory where our HTML/CSS/JS files live
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files with smart fallback
    # 1. Try exact file  → /css/base.css      → serves it
    # 2. Try directory   → /products/          → serves index.html inside
    # 3. Try .html       → /login              → serves /login.html
    # 4. Fallback        → anything else       → serves /index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Cache static assets — browser won't re-download unchanged files
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Send logs to stdout/stderr — Docker/K8s captures them automatically
    access_log /dev/stdout;
    error_log /dev/stderr;
}
