version: "3.9"

services:

  auth-db:
    image: postgres:14
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password123
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
    depends_on:
      auth-db:
        condition: service_healthy

volumes:
  auth_db_data:
